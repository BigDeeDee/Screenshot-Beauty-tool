        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #e5e5ea;
            --accent: #0071e3;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 56px;
        }
        .nav-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        .nav-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.15s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .lang-switch {
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .lang-switch:hover { border-color: var(--accent); color: var(--accent); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border-color: var(--accent);
        }
        .card-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }
        .card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            flex-grow: 1;
        }
        .card .date {
            font-size: 12px;
            color: #aeaeb2;
            margin-top: 16px;
        }
        footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <nav>

                </ul>
                <button class="lang-switch" id="langBtn" onclick="toggleLang()">EN</button>

        </div>
    </nav>

                <span class="date">2026-06-01</span>
            </a>

            <!-- 文章 2 -->
            <a href="blog-post-2.html" class="card">
                <div class="card-icon">🚀</div>
                <h3 data-i18n="post2-title">截图圆角+阴影，10秒搞定公众号配图</h3>

    <footer>
        <p>© 2026 <span data-i18n="footer-brand">截图美化工具</span> · <a href="privacy.html" data-i18n="footer-privacy">隐私政策</a></p>
    </footer>

    <script>
        const i18n = {
            zh: {
                'page-title': '博客 - 截图美化工具',
                'logo': '📸 截图美化',
                'nav-home': '首页',
                'nav-tool': '工具',
                'nav-blog': '博客',
                'nav-about': '关于',
                'header-title': '📝 博客',
                'header-subtitle': '分享截图美化技巧、设计干货与效率工具使用指南',
                'post1-title': '圆角半径多少最合适？设计师不说的黄金比例',
                'post1-desc': '不同场景下圆角该设多少？揭秘设计师私藏的圆角尺寸指南与黄金比例。',
                'post2-title': '截图圆角+阴影，10秒搞定公众号配图',
                'post2-desc': '公众号运营者必备技巧：无需PS，浏览器里3步提升截图质感。',
                'post3-title': '不用PS！浏览器里3步搞定截图美化',
                'post3-desc': '告别复杂的Photoshop，学会用浏览器在线工具快速美化截图，提升工作效率。',
                'footer-brand': '截图美化工具',
                'footer-privacy': '隐私政策'
            },
            en: {
                'page-title': 'Blog - Screenshot Beautifier',
                'logo': '📸 Screenshot Beauty',
                'nav-home': 'Home',
                'nav-tool': 'Tool',
                'nav-blog': 'Blog',
                'nav-about': 'About',
                'header-title': '📝 Blog',
                'header-subtitle': 'Tips on screenshot beautification, design insights, and efficiency guides',
                'post1-title': 'What Rounded Corner Radius Looks Best? The Designer\'s Golden Ratio',
                'post1-desc': 'How much radius for different scenarios? Revealing the designer\'s private guide to corner sizes.',
                'post2-title': 'Rounded Corners + Shadows: Perfect WeChat Article Images in 10 Seconds',
                'post2-desc': 'Essential tips for WeChat operators: Enhance screenshot quality in 3 steps without PS.',
                'post3-title': 'No PS Needed! Beautify Screenshots in 3 Steps Right in Your Browser',
                'post3-desc': 'Say goodbye to complex Photoshop. Learn to quickly beautify screenshots with browser tools.',
                'footer-brand': 'Screenshot Beautifier',
                'footer-privacy': 'Privacy Policy'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
        }

        function applyLanguage() {
            const dict = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'EN' : '中';
            localStorage.setItem('lang', currentLang);
            
            // 更新页面标题
            document.title = dict['page-title'];
        }

        // 初始化
        applyLanguage();
    </script>
</body>
</html>
