<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">博客 - 截图美化工具</title>
    <meta name="description" data-i18n="meta-desc" content="截图美化技巧与使用教程，让你的截图更出彩。">
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #e5e5ea;
            --accent: #0071e3;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 56px;
        }
        .nav-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        .nav-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.15s;
        }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a.active { color: var(--accent); }
        .lang-switch {
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .lang-switch:hover { border-color: var(--accent); color: var(--accent); }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .blog-list { display: flex; flex-direction: column; gap: 16px; }
        .blog-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-decoration: none;
            color: var(--text);
            transition: box-shadow 0.2s, transform 0.15s;
            display: block;
        }
        .blog-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .blog-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }
        .blog-card .blog-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .blog-card .blog-date {
            font-size: 13px;
            color: #aeaeb2;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            .page-title { font-size: 26px; }
            .nav-links { gap: 12px; }
            .nav-right { gap: 12px; }
            .nav-links a { font-size: 13px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-logo" data-i18n="logo">📸 截图美化</a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav-home">首页</a></li>
                    <li><a href="tool.html" data-i18n="nav-tool">工具</a></li>
                    <li><a href="blog.html" class="active" data-i18n="nav-blog">博客</a></li>
                    <li><a href="about.html" data-i18n="nav-about">关于</a></li>
                </ul>
                <button class="lang-switch" id="langBtn" onclick="toggleLang()">EN</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title" data-i18n="page-title">📝 博客</h1>
        <p class="page-subtitle" data-i18n="page-subtitle">截图美化技巧 & 实用教程</p>

        <div class="blog-list" id="blogList">
            <!-- 文章1 -->
            <a href="blog-post-1.html" class="blog-card" data-blog="post1">
                <h3 data-i18n="post1-title">如何让公众号推文截图更有质感？3个小技巧</h3>
                <p class="blog-desc" data-i18n="post1-desc">写公众号时截图总是显得生硬？三个零门槛技巧，让截图一秒变精致...</p>
                <span class="blog-date" data-i18n="post1-date">2026年06月05日</span>
            </a>
            <!-- 第二篇文章卡片 -->
            <a href="blog-post-2.html" class="card">
                <div class="card-icon">🚀</div>
                <h3 data-i18n="post2-title">截图圆角+阴影，10秒搞定公众号配图</h3>
                <p data-i18n="post2-desc">公众号运营者必备技巧：无需PS，浏览器里3步提升截图质感。</p>
                <span class="date">2026-06-07</span>
            </a>

            <!-- 以后添加新文章在这里复制上面的 a 标签 -->
        </div>

        <!-- 如果没有文章时显示 -->
        <!-- <div class="empty-state" data-i18n="empty">暂无文章，敬请期待...</div> -->
    </div>

    <footer>
        <p>© 2026 <span data-i18n="footer-brand">截图美化工具</span> · <a href="privacy.html" data-i18n="footer-privacy">隐私政策</a> · <a href="about.html" data-i18n="footer-contact">联系我们</a></p>
    </footer>

    <script>
        const i18n = {
            zh: {
                title: '博客 - 截图美化工具',
                'meta-desc': '截图美化技巧与使用教程，让你的截图更出彩。',
                logo: '📸 截图美化',
                'nav-home': '首页',
                'nav-tool': '工具',
                'nav-blog': '博客',
                'nav-about': '关于',
                'page-title': '📝 博客',
                'page-subtitle': '截图美化技巧 & 实用教程',
                'post1-title': '如何让公众号推文截图更有质感？3个小技巧',
                'post1-desc': '写公众号时截图总是显得生硬？三个零门槛技巧，让截图一秒变精致...',
                'post1-date': '2026年06月05日',
                'post2-title': '截图圆角+阴影，10秒搞定公众号配图',
                'post2-desc': '公众号运营者必备技巧：无需PS，浏览器里3步提升截图质感。'
                'post2-date': '2026年06月07日',
                'footer-brand': '截图美化工具',
                'footer-privacy': '隐私政策',
                'footer-contact': '联系我们',
                empty: '暂无文章，敬请期待...'
            },
            en: {
                title: 'Blog - Screenshot Beautifier',
                'meta-desc': 'Screenshot beautifying tips and tutorials. Make your screenshots stand out.',
                logo: '📸 Screenshot Beauty',
                'nav-home': 'Home',
                'nav-tool': 'Tool',
                'nav-blog': 'Blog',
                'nav-about': 'About',
                'page-title': '📝 Blog',
                'page-subtitle': 'Screenshot Tips & Tutorials',
                'post1-title': 'How to Make Your Blog Screenshots Look Premium: 3 Quick Tips',
                'post1-desc': 'Plain screenshots look boring in blog posts. Three zero-skill tips to make them look polished instantly...',
                'post1-date': 'June 5, 2026',
                'post2-title': 'Rounded Corners + Shadows: Perfect WeChat Article Images in 10 Seconds',
                'post2-desc': 'Essential tips for WeChat operators: Enhance screenshot quality in 3 steps without PS.'
                'post2-date': 'June 7, 2026',
                'footer-brand': 'Screenshot Beautifier',
                'footer-privacy': 'Privacy Policy',
                'footer-contact': 'Contact Us',
                empty: 'No articles yet. Stay tuned!'
            }
        };

        let currentLang = 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
        }

        function applyLanguage() {
            const dict = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });
            document.title = dict.title;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', dict['meta-desc']);
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'EN' : '中';
            localStorage.setItem('lang', currentLang);
        }

        const savedLang = localStorage.getItem('lang');
        if (savedLang === 'en') { currentLang = 'en'; applyLanguage(); }
    </script>
</body>
</html>
